site_name: 老中传习录
site_url: https://sakuri932.github.io/my-wiki/

hooks:
  - hooks/pdf_list.py
  - hooks/recent_updates.py

# 1. 主题与颜色、界面功能设置（必须与 nav、plugins 平级）
theme:
  name: material
  language: zh
  palette:
    # 浅色模式设置
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red       # 喜庆的红色生效
      accent: red
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    # 深色模式设置
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red       # 喜庆的红色生效
      accent: red
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  features:
    - navigation.tabs        # 顶部横向 Tab
    - navigation.tabs.sticky # 让顶部 Tab 滚动时始终吸顶
    - navigation.indexes     # 允许分区拥有自己的 index 页面
    - navigation.top         # 回到顶部按钮
    - navigation.tracking    # 左侧目录树跟随
    - toc.follow             # 右侧目录树跟随
    - content.code.copy  # 在代码块右上角开启”复制”按钮

    - search.suggest    # 搜索建议
    - search.highlight  # 搜索词高亮
    - search.share      # 搜索结果分享链接


# 2. 插件设置
plugins:
  - search
  - blog:
      archive: false
      categories: false

# 3. Markdown 扩展语法设置（把所有扩展合并到了这里）
markdown_extensions:
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true # 允许链接到具体代码行
  - attr_list
  - toc:
      toc_depth: 2  # 右侧目录只显示到二级标题
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

