<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaTeX Formula Studio</title>

<script>
window.MathJax = {
  loader: { load: ['[tex]/ams','[tex]/mhchem','[tex]/physics','[tex]/boldsymbol',
                   '[tex]/color','[tex]/cancel','[tex]/bbox','[tex]/braket',
                   '[tex]/unicode','[tex]/enclose','[tex]/newcommand','[tex]/noerrors'] },
  tex: {
    // 'cases' 不是独立包，已内置于 'ams'；移除避免 404 破坏扩展加载链
    packages: {'[+]': ['ams','mhchem','physics','boldsymbol','color',
                       'cancel','bbox','braket','unicode','enclose','newcommand','noerrors']},
    inlineMath:  [['$','$'],['\\(','\\)']],
    displayMath: [['$$','$$'],['\\[','\\]']],
  },
  svg: { fontCache: 'local' },
  startup: { typeset: false }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" id="MathJax-script" async></script>

<style>
/* ── Reset & Base ───────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { overflow-x: hidden; }

:root {
  --bg-page:    #f2f4f8;
  --bg-card:    #ffffff;
  --bg-input:   #f7f8fc;
  --bg-header:  #ffffff;

  --blue:       #3b82f6;
  --blue-dark:  #1d4ed8;
  --blue-soft:  #eff6ff;
  --indigo:     #6366f1;
  --purple:     #8b5cf6;
  --teal:       #14b8a6;
  --rose:       #f43f5e;
  --amber:      #f59e0b;
  --green:      #22c55e;

  --text-1:     #111827;
  --text-2:     #6b7280;
  --text-3:     #9ca3af;

  --border:     #e5e7eb;
  --border-focus: #3b82f6;

  --shadow-sm:  0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  --shadow-md:  0 4px 12px rgba(0,0,0,.09), 0 2px 4px rgba(0,0,0,.06);
  --shadow-lg:  0 10px 30px rgba(0,0,0,.12), 0 4px 8px rgba(0,0,0,.06);

  --radius-sm:  6px;
  --radius-md:  10px;
  --radius-lg:  14px;

  --font-ui:    -apple-system, 'SF Pro Display', 'Segoe UI', 'PingFang SC',
                'Hiragino Sans', 'Yu Gothic UI', 'Noto Sans CJK SC', sans-serif;
  --font-mono:  'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
}

body {
  font-family: var(--font-ui);
  background: var(--bg-page);
  color: var(--text-1);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ── Header ────────────────────────────────────────────────────── */
.app-header {
  background: var(--bg-header);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 52px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  background: rgba(255,255,255,.9);
}

.logo-mark {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--blue), var(--indigo));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: 800;
  color: white;
  letter-spacing: -1px;
  flex-shrink: 0;
}

.app-title { font-size: 15px; font-weight: 650; letter-spacing: -.3px; }
.app-subtitle { font-size: 12px; color: var(--text-3); }

.header-right {
  margin-left: auto;
  display: flex;
  gap: 8px;
  align-items: center;
}

.pill-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
  background: var(--blue-soft);
  color: var(--blue);
}

/* ── Main Layout ────────────────────────────────────────────────── */
.workspace {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  padding: 16px;
  flex: 1;
  min-height: 0;
}

/* ── Cards ─────────────────────────────────────────────────────── */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.card-header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  background: #fafbfd;
}
.card-header-icon {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
}
.icon-blue   { background: #eff6ff; }
.icon-purple { background: #f5f3ff; }
.icon-teal   { background: #f0fdfa; }

.card-title {
  font-size: 12.5px;
  font-weight: 650;
  color: var(--text-1);
  letter-spacing: -.2px;
}
.card-actions { margin-left: auto; display: flex; gap: 6px; align-items: center; }

/* ── Symbol Tabs ────────────────────────────────────────────────── */
.sym-tabs-wrap {
  position: relative;
  display: flex;
  align-items: stretch;
  background: #fafbfd;
  border-bottom: 1px solid var(--border);
}
.sym-tabs-bar {
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  flex: 1;
  min-width: 0;
  padding: 0 2px;
  gap: 2px;
  scroll-behavior: smooth;
}
.sym-tabs-bar::-webkit-scrollbar { display: none; }

.sym-scroll-btn {
  flex-shrink: 0;
  width: 26px;
  border: none;
  background: #fafbfd;
  color: var(--text-2);
  cursor: pointer;
  font-size: 12px;
  display: none;           /* shown by JS when overflow detected */
  align-items: center;
  justify-content: center;
  transition: background .12s, color .12s;
  border-left: 1px solid var(--border);
}
.sym-scroll-btn:first-child {
  border-left: none;
  border-right: 1px solid var(--border);
}
.sym-scroll-btn:hover { background: var(--blue-soft); color: var(--blue); }
.sym-scroll-btn.visible { display: flex; }

.sym-tab {
  flex-shrink: 0;
  padding: 7px 10px;
  font-size: 11.5px;
  font-weight: 500;
  color: var(--text-2);
  cursor: pointer;
  border: none;
  background: none;
  border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s;
  white-space: nowrap;
  font-family: var(--font-ui);
}
.sym-tab:hover { color: var(--text-1); }
.sym-tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }

.sym-panel {
  display: none;
  flex-wrap: wrap;
  gap: 3px;
  padding: 8px 10px;
  max-height: 118px;
  overflow-y: auto;
  background: #fafbfd;
  border-bottom: 1px solid var(--border);
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.sym-panel.active { display: flex; }

.sym-btn {
  position: relative;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-1);
  padding: 4px 7px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 12.5px;
  min-width: 32px;
  text-align: center;
  transition: all .12s;
  font-family: 'Latin Modern Math', 'STIX Two Math', serif;
  line-height: 1.4;
}
.sym-btn:hover {
  background: var(--blue-soft);
  border-color: var(--blue);
  color: var(--blue);
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}
/* Tooltip */
.sym-btn[data-tip]:hover::after {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--text-1);
  color: #fff;
  font-size: 10px;
  font-family: var(--font-mono);
  padding: 3px 6px;
  border-radius: 4px;
  white-space: nowrap;
  pointer-events: none;
  z-index: 200;
}

/* ── Input Toolbar ──────────────────────────────────────────────── */
.input-toolbar {
  padding: 7px 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  background: #fafbfd;
}

.toolbar-label { font-size: 11.5px; color: var(--text-2); font-weight: 500; }

.seg-control {
  display: flex;
  background: var(--bg-page);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 2px;
  gap: 1px;
}
.seg-btn {
  padding: 3px 10px;
  font-size: 11.5px;
  font-weight: 500;
  border-radius: 5px;
  border: none;
  background: none;
  color: var(--text-2);
  cursor: pointer;
  transition: all .15s;
  font-family: var(--font-ui);
}
.seg-btn.active {
  background: var(--bg-card);
  color: var(--text-1);
  box-shadow: var(--shadow-sm);
  font-weight: 600;
}

.lang-bar {
  display: flex;
  gap: 4px;
  align-items: center;
  padding: 5px 12px;
  border-bottom: 1px solid var(--border);
  background: #fafbfd;
}
.lang-btn {
  padding: 2px 8px;
  font-size: 11px;
  font-weight: 500;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-2);
  cursor: pointer;
  transition: all .15s;
  font-family: var(--font-ui);
}
.lang-btn:hover { border-color: var(--blue); color: var(--blue); }

.ghost-btn {
  padding: 3px 9px;
  font-size: 11.5px;
  font-weight: 500;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-2);
  cursor: pointer;
  transition: all .12s;
  font-family: var(--font-ui);
}
.ghost-btn:hover { background: var(--bg-page); color: var(--text-1); }

/* ── Textarea ───────────────────────────────────────────────────── */
#latex-input {
  flex: 1;
  width: 100%;
  border: none;
  outline: none;
  resize: none;
  font-family: var(--font-mono);
  font-size: 13.5px;
  line-height: 1.7;
  color: var(--text-1);
  background: var(--bg-input);
  padding: 14px 16px;
  min-height: 170px;
  tab-size: 2;
}
#latex-input::placeholder { color: var(--text-3); }
#latex-input:focus { background: #fefeff; }

.input-footer {
  padding: 6px 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid var(--border);
  background: #fafbfd;
}
.char-count { font-size: 11px; color: var(--text-3); }

.render-btn {
  padding: 5px 14px;
  font-size: 12px;
  font-weight: 600;
  border-radius: 7px;
  border: none;
  background: linear-gradient(135deg, var(--blue), var(--indigo));
  color: white;
  cursor: pointer;
  transition: all .15s;
  font-family: var(--font-ui);
  letter-spacing: .1px;
}
.render-btn:hover { opacity: .88; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59,130,246,.35); }
.render-btn:active { transform: translateY(0); }

/* ── Examples Dropdown ──────────────────────────────────────────── */
.ex-wrap { position: relative; }
.ex-menu {
  display: none;
  /* fixed 定位：脱离所有 overflow:hidden 祖先，不被卡片裁剪 */
  position: fixed;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg);
  min-width: 300px;
  max-height: 360px;
  overflow-y: auto;
  z-index: 9999;
  scrollbar-width: thin;
}
.ex-menu.open { display: block; }
.ex-cat {
  padding: 6px 12px 4px;
  font-size: 10.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--blue);
  background: var(--blue-soft);
  border-bottom: 1px solid var(--border);
}
.ex-item {
  padding: 8px 12px;
  cursor: pointer;
  border-bottom: 1px solid #f3f4f6;
  transition: background .1s;
}
.ex-item:hover { background: var(--blue-soft); }
.ex-item-label { font-size: 12px; font-weight: 600; color: var(--text-1); margin-bottom: 2px; }
.ex-item-code  { font-size: 11px; font-family: var(--font-mono); color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── Settings Panel ─────────────────────────────────────────────── */
.settings-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
}

.setting-cell {
  padding: 10px 14px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.setting-cell:nth-child(even) { border-right: none; }

.setting-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: .6px;
  margin-bottom: 6px;
  display: flex;
  justify-content: space-between;
}
.setting-val {
  font-size: 11px;
  font-weight: 600;
  color: var(--blue);
  font-family: var(--font-mono);
  text-transform: none;
  letter-spacing: 0;
}

/* Sliders */
input[type=range] {
  -webkit-appearance: none;
  width: 100%;
  height: 3px;
  border-radius: 2px;
  background: linear-gradient(to right, var(--blue) 0%, var(--border) 0%);
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 2px solid var(--blue);
  cursor: pointer;
  box-shadow: 0 1px 4px rgba(59,130,246,.3);
  transition: transform .1s;
}
input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }

/* Color pickers */
.color-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
input[type=color] {
  -webkit-appearance: none;
  width: 26px;
  height: 22px;
  border: 1.5px solid var(--border);
  border-radius: 5px;
  cursor: pointer;
  background: none;
  padding: 1px;
}
input[type=color]::-webkit-color-swatch-wrapper { padding: 0; }
input[type=color]::-webkit-color-swatch { border-radius: 3px; border: none; }

.color-swatch {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all .15s;
  flex-shrink: 0;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,.1);
}
.color-swatch:hover { transform: scale(1.2); border-color: var(--blue); }

/* Select */
select {
  font-family: var(--font-ui);
  font-size: 12px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 4px 8px;
  color: var(--text-1);
  outline: none;
  width: 100%;
  cursor: pointer;
}
select:focus { border-color: var(--blue-focus); }

input[type=number] {
  font-family: var(--font-mono);
  font-size: 12px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 4px 6px;
  color: var(--text-1);
  outline: none;
  width: 58px;
}
input[type=number]:focus { border-color: var(--blue); }

/* ── Preview ────────────────────────────────────────────────────── */
.preview-area {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: auto;
  padding: 24px;
  min-height: 150px;
  cursor: crosshair;
}

/* Checkered background for transparency */
.checker-bg {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(45deg, #e8eaf0 25%, transparent 25%),
    linear-gradient(-45deg, #e8eaf0 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #e8eaf0 75%),
    linear-gradient(-45deg, transparent 75%, #e8eaf0 75%);
  background-size: 14px 14px;
  background-position: 0 0, 0 7px, 7px -7px, -7px 0;
  opacity: .5;
}

#preview-box {
  position: relative;
  z-index: 1;
  border-radius: var(--radius-md);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: background .2s, padding .2s;
  min-width: 80px;
  min-height: 48px;
}

.preview-hint {
  font-size: 13px;
  color: var(--text-3);
  text-align: center;
  line-height: 1.6;
}
.preview-hint code {
  display: block;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-2);
  margin-top: 4px;
}

.error-card {
  background: #fff5f5;
  border: 1px solid #fecaca;
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 12px;
  font-family: var(--font-mono);
  color: #b91c1c;
  max-width: 340px;
  word-break: break-word;
  line-height: 1.5;
}

/* ── Export Panel ───────────────────────────────────────────────── */
.export-panel {
  padding: 12px 14px;
  border-top: 1px solid var(--border);
  background: #fafbfd;
}

.export-title-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 9px;
}
.export-section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .7px;
  color: var(--text-2);
}

.export-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.exp-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 12px;
  font-size: 11.5px;
  font-weight: 650;
  border-radius: 7px;
  border: 1.5px solid;
  cursor: pointer;
  transition: all .15s;
  font-family: var(--font-ui);
  letter-spacing: .3px;
}
.exp-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
.exp-btn:active { transform: translateY(0); }

.exp-png  { background:#f0fdf4; border-color:#86efac; color:#15803d; }
.exp-png:hover  { background:#22c55e; border-color:#22c55e; color:white; }
.exp-jpg  { background:#eff6ff; border-color:#93c5fd; color:#1d4ed8; }
.exp-jpg:hover  { background:#3b82f6; border-color:#3b82f6; color:white; }
.exp-webp { background:#fdf4ff; border-color:#d8b4fe; color:#7e22ce; }
.exp-webp:hover { background:#8b5cf6; border-color:#8b5cf6; color:white; }
.exp-svg  { background:#fff7ed; border-color:#fdba74; color:#c2410c; }
.exp-svg:hover  { background:#f97316; border-color:#f97316; color:white; }
.exp-pdf  { background:#fff1f2; border-color:#fda4af; color:#be123c; }
.exp-pdf:hover  { background:#f43f5e; border-color:#f43f5e; color:white; }
.exp-copy-svg   { background:#f0fdfa; border-color:#5eead4; color:#0f766e; }
.exp-copy-svg:hover   { background:#14b8a6; border-color:#14b8a6; color:white; }
.exp-copy-tex   { background:#fafafa; border-color:#d1d5db; color:#374151; }
.exp-copy-tex:hover   { background:#374151; border-color:#374151; color:white; }

/* ── Size Row ───────────────────────────────────────────────────── */
.size-row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  padding: 8px 14px;
  border-top: 1px solid var(--border);
  background: #fafbfd;
}
.size-label { font-size: 11px; color: var(--text-2); font-weight: 600; }
.size-chip {
  padding: 2px 8px;
  font-size: 11px;
  font-weight: 500;
  border-radius: 5px;
  border: 1.5px solid var(--border);
  background: var(--bg-card);
  color: var(--text-2);
  cursor: pointer;
  transition: all .12s;
  font-family: var(--font-ui);
}
.size-chip:hover { border-color: var(--blue); color: var(--blue); }
.size-chip.active { background: var(--blue-soft); border-color: var(--blue); color: var(--blue); font-weight: 600; }

/* ── Status Bar ─────────────────────────────────────────────────── */
.status-bar {
  height: 28px;
  padding: 0 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-top: 1px solid var(--border);
  background: #fafbfd;
  font-size: 11px;
}
.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
  background: #d1d5db;
  transition: background .3s;
}
.status-dot.ok     { background: var(--green); box-shadow: 0 0 0 2px rgba(34,197,94,.2); }
.status-dot.err    { background: var(--rose); box-shadow: 0 0 0 2px rgba(244,63,94,.2); }
.status-dot.busy   { background: var(--amber); box-shadow: 0 0 0 2px rgba(245,158,11,.2);
                     animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.status-text { color: var(--text-2); }
.status-time { margin-left: auto; color: var(--text-3); font-family: var(--font-mono); font-size: 10.5px; }

/* ── Scrollbar ──────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #c5c8d0; }

/* ── Responsive ─────────────────────────────────────────────────── */

/* 中等窗口：切单列 */
@media (max-width: 860px) {
  .workspace {
    grid-template-columns: 1fr;
    padding: 10px;
    gap: 10px;
  }
  .preview-area { min-height: 120px; }
  #latex-input  { min-height: 130px; }
}

/* 小窗口：隐藏 header 装饰徽章，压缩间距 */
@media (max-width: 640px) {
  .pill-badge { display: none; }

  .app-header { padding: 0 12px; gap: 8px; height: 46px; }
  .logo-mark  { width: 26px; height: 26px; font-size: 13px; }
  .app-title  { font-size: 13.5px; }

  .workspace  { padding: 8px; gap: 8px; }

  .card-header { padding: 8px 10px; }
  .sym-panel   { max-height: 96px; }

  .settings-grid { grid-template-columns: 1fr 1fr; }
  .setting-cell  { padding: 8px 10px; }

  .size-row  { padding: 6px 10px; gap: 4px; }
  .size-chip { padding: 2px 6px; font-size: 10.5px; }

  .export-panel { padding: 10px; }
  .exp-btn { padding: 4px 9px; font-size: 11px; }

  #latex-input { min-height: 110px; padding: 10px 12px; font-size: 13px; }

  .lang-switch { margin-left: 4px; }
  .lang-switch-btn { padding: 2px 6px; font-size: 10.5px; }
}

/* 超小窗口：进一步压缩，设置改单列，隐藏尺寸文字标签 */
@media (max-width: 420px) {
  .app-title  { display: none; }
  .app-header { height: 42px; }

  .workspace  { padding: 6px; gap: 6px; }

  .sym-tab  { padding: 6px 7px; font-size: 11px; }
  .sym-panel { max-height: 80px; }

  .settings-grid { grid-template-columns: 1fr; }
  .setting-cell  { border-right: none; }
  .setting-cell:nth-child(even) { border-right: none; }

  .size-row { flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; }
  .size-row::-webkit-scrollbar { display: none; }
  .size-chip, input[type=number] { flex-shrink: 0; }

  .export-btns { gap: 4px; }
  .exp-btn { padding: 3px 8px; font-size: 10.5px; }

  #latex-input { min-height: 90px; font-size: 12.5px; }

  /* 语言切换在超小屏只显示缩写 */
  .lang-switch-btn[data-lang="zh"]::before { content: "中"; }
  .lang-switch-btn[data-lang="en"]::before { content: "EN"; }
  .lang-switch-btn[data-lang="ja"]::before { content: "日"; }
  .lang-switch-btn[data-lang="ko"]::before { content: "한"; }
  .lang-switch-btn { font-size: 0; padding: 2px 5px; }
  .lang-switch-btn::before { font-size: 10.5px; }
}

/* ── Language Switcher ──────────────────────────────────────────── */
.lang-switch {
  display: flex;
  gap: 2px;
  background: #f0f2f5;
  border-radius: 8px;
  padding: 3px;
  margin-left: 8px;
}
.lang-switch-btn {
  padding: 3px 9px;
  font-size: 11.5px;
  font-weight: 600;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: transparent;
  color: var(--text-2);
  transition: all .15s;
  font-family: var(--font-ui);
  line-height: 1.4;
}
.lang-switch-btn:hover { color: var(--text-1); }
.lang-switch-btn.active {
  background: #fff;
  color: var(--blue);
  box-shadow: 0 1px 3px rgba(0,0,0,.12);
}

/* ── Hidden typeset sink ────────────────────────────────────────── */
#mj-sink {
  position: fixed;      /* fixed 定位保证布局上下文稳定，getBoundingClientRect 可靠 */
  visibility: hidden;
  pointer-events: none;
  left: -99999px;
  top: 0;
  font-size: 18px;
}
</style>
</head>
<body>

<!-- Hidden MathJax rendering sink -->
<div id="mj-sink" aria-hidden="true"></div>

<!-- ── Header ─────────────────────────────────────────────────── -->
<header class="app-header">
  <div class="logo-mark">∑</div>
  <div>
    <div class="app-title">LaTeX Formula Studio</div>
  </div>
  <div class="header-right">
    <span class="pill-badge">MathJax 3</span>
    <span class="pill-badge" style="background:#f5f3ff;color:var(--indigo)">mhchem</span>
    <span class="pill-badge" style="background:#f0fdfa;color:var(--teal)">physics</span>
    <div class="lang-switch" id="lang-switch">
      <button class="lang-switch-btn active" data-lang="zh" onclick="applyLang('zh')">中文</button>
      <button class="lang-switch-btn" data-lang="en" onclick="applyLang('en')">EN</button>
      <button class="lang-switch-btn" data-lang="ja" onclick="applyLang('ja')">日本語</button>
      <button class="lang-switch-btn" data-lang="ko" onclick="applyLang('ko')">한국어</button>
    </div>
  </div>
</header>

<!-- ── Workspace ───────────────────────────────────────────────── -->
<div class="workspace">

  <!-- LEFT: Input Card -->

    <div class="card-header">

      <span class="card-title" data-i18n="sym_input">符号 & 公式输入</span>
      <div class="card-actions">
        <div class="ex-wrap">
          <button class="ghost-btn" id="ex-btn" onclick="toggleExMenu()" data-i18n="examples_btn">示例 ▾</button>
          <div class="ex-menu" id="ex-menu"></div>
        </div>
        <div class="ex-wrap" id="tpl-wrap">
          <button class="ghost-btn" id="tpl-btn" onclick="toggleTplMenu()" style="border-color:#f59e0b;color:#b45309;" data-i18n="templates_btn">大型方程 ▾</button>
          <div class="ex-menu" id="tpl-menu"></div>
        </div>
      </div>
    </div>

    <!-- Symbol tabs -->
    <div class="sym-tabs-wrap">
      <button class="sym-scroll-btn" id="sym-scroll-l" onclick="symScroll(-1)" tabindex="-1">‹</button>
      <div class="sym-tabs-bar" id="sym-tabs"></div>
      <button class="sym-scroll-btn" id="sym-scroll-r" onclick="symScroll(1)"  tabindex="-1">›</button>
    </div>
    <div id="sym-panels"></div>

    <!-- Mode toolbar -->
    <div class="input-toolbar">
      <span class="toolbar-label" data-i18n="display_mode">显示模式</span>
      <div class="seg-control">
        <button class="seg-btn active" id="btn-display" onclick="setMode('display')">Display $$…$$</button>
        <button class="seg-btn" id="btn-inline"  onclick="setMode('inline')">Inline $…$</button>
      </div>
      <div style="margin-left:auto;display:flex;gap:5px;">
        <button class="ghost-btn" onclick="doClear()" data-i18n="clear">清空</button>
      </div>
    </div>

    <!-- Textarea -->
    <textarea id="latex-input" data-i18n="placeholder" data-i18n-attr="placeholder" placeholder="在此输入 LaTeX 公式，Ctrl/⌘+Enter 立即渲染
示例：\int_{-\infty}^{\infty} e^{-x^2}\,dx = \sqrt{\pi}
化学：\ce{H2O + CO2 -> H2CO3}
量子：\bra{\psi}\hat{H}\ket{\psi}
中文：f(x) = \text{正弦函数}" spellcheck="false"></textarea>

    <div class="input-footer">
      <span class="char-count" id="char-count">0 字符</span>
      <button class="render-btn" onclick="renderNow()" data-i18n="render_btn">▶ 立即渲染</button>
    </div>
  </div>

  <!-- RIGHT: Preview + Settings Card -->
  <div class="card">
    <!-- Settings -->
    <div class="card-header">
      <div class="card-header-icon icon-purple">⚙</div>
      <span class="card-title" data-i18n="render_settings">渲染设置</span>
    </div>

    <div class="settings-grid">
      <!-- Font size -->
      <div class="setting-cell">
        <div class="setting-label"><span data-i18n="font_size">字体大小</span> <span class="setting-val" id="lbl-fs">18 px</span></div>
        <input type="range" id="sl-fs" min="8" max="100" value="18" oninput="onSetting()">
      </div>
      <!-- Export scale -->
      <div class="setting-cell">
        <div class="setting-label"><span data-i18n="export_scale">导出缩放</span> <span class="setting-val" id="lbl-sc">2 ×</span></div>
        <input type="range" id="sl-sc" min="1" max="8" value="2" step="0.5" oninput="onSetting()">
      </div>
      <!-- Formula color -->
      <div class="setting-cell">
        <div class="setting-label" data-i18n="formula_color">公式颜色</div>
        <div class="color-row">
          <input type="color" id="col-formula" value="#1a1a2e" oninput="onSetting()">
          <div id="swatches-formula"></div>
        </div>
      </div>
      <!-- Background color -->
      <div class="setting-cell">
        <div class="setting-label" data-i18n="bg_color">背景颜色</div>
        <div class="color-row">
          <input type="color" id="col-bg" value="#ffffff" oninput="onSetting()">
          <div id="swatches-bg"></div>
        </div>
      </div>
      <!-- BG alpha -->
      <div class="setting-cell">
        <div class="setting-label"><span data-i18n="bg_alpha">背景透明度</span> <span class="setting-val" id="lbl-al">100%</span></div>
        <input type="range" id="sl-al" min="0" max="100" value="100" oninput="onSetting()">
      </div>
      <!-- Padding -->
      <div class="setting-cell">
        <div class="setting-label"><span data-i18n="padding">内边距</span> <span class="setting-val" id="lbl-pd">20 px</span></div>
        <input type="range" id="sl-pd" min="0" max="80" value="20" oninput="onSetting()">
      </div>
    </div>

    <!-- Export size chips -->
    <div class="size-row">
      <span class="size-label" data-i18n="export_size">导出尺寸:</span>
      <button class="size-chip active" onclick="setSize('auto')" data-size="auto" data-i18n="size_auto">自动</button>
      <button class="size-chip" onclick="setSize('hd')" data-size="hd">HD 720p</button>
      <button class="size-chip" onclick="setSize('fhd')" data-size="fhd">FHD 1080p</button>
      <button class="size-chip" onclick="setSize('2k')" data-size="2k">2K</button>
      <button class="size-chip" onclick="setSize('4k')" data-size="4k">4K</button>
      <input type="number" id="inp-w" data-i18n="width_ph" data-i18n-attr="placeholder" placeholder="宽" min="1" max="9999" oninput="setSize('custom')">
      <span style="font-size:11px;color:var(--text-3)">×</span>
      <input type="number" id="inp-h" data-i18n="height_ph" data-i18n-attr="placeholder" placeholder="高" min="1" max="9999" oninput="setSize('custom')">
      <span style="font-size:11px;color:var(--text-3)">px</span>
    </div>

    <!-- Preview -->
    <div class="card-header" style="border-top:1px solid var(--border);">
      <div class="card-header-icon icon-teal">👁</div>
      <span class="card-title" data-i18n="preview">实时预览</span>
      <div class="card-actions" style="font-size:10.5px;color:var(--text-3);" data-i18n="transparency_checker">透明度检查板</div>
    </div>

    <div class="preview-area" id="preview-area">
      <div class="checker-bg"></div>
      <div id="preview-box">
        <div class="preview-hint">在左侧输入公式<code>Ctrl/⌘+Enter 快速渲染</code></div>
      </div>
    </div>

    <!-- Export buttons -->
    <div class="export-panel">
      <div class="export-title-row">
        <span class="export-section-title" data-i18n="export_copy">导出 / 复制</span>
      </div>
      <div class="export-btns">
        <button class="exp-btn exp-png"      onclick="exportRaster('png')">PNG</button>
        <button class="exp-btn exp-jpg"      onclick="exportRaster('jpeg')">JPG</button>
        <button class="exp-btn exp-webp"     onclick="exportRaster('webp')">WebP</button>
        <button class="exp-btn exp-svg"      onclick="exportSVG()">SVG</button>
        <button class="exp-btn exp-pdf"      onclick="exportPDF()">PDF</button>
        <button class="exp-btn exp-copy-svg" onclick="copySVGCode()" data-i18n="copy_svg">复制 SVG</button>
        <button class="exp-btn exp-copy-tex" onclick="copyLatex()" data-i18n="copy_latex">复制 LaTeX</button>
      </div>
    </div>

    <!-- Status bar -->
    <div class="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span class="status-text" id="status-text">等待 MathJax 加载…</span>
      <span class="status-time" id="status-time"></span>
    </div>
  </div>
</div>

function buildSymbols() {
  const tabBar = document.getElementById('sym-tabs');
  const panels = document.getElementById('sym-panels');
  let first = true;
  for (const [cat, syms] of Object.entries(SYM)) {
    const tab = document.createElement('button');
    tab.className = 'sym-tab' + (first?' active':'');
    tab.textContent = (SYM_LABELS[currentLang] || SYM_LABELS.zh)[cat] || cat;
    tab.dataset.c = cat;
    tab.onclick = () => activateSymTab(cat);
    tabBar.appendChild(tab);

    const panel = document.createElement('div');
    panel.className = 'sym-panel' + (first?' active':'');
    panel.dataset.c = cat;
    for (const [label, latex] of syms) {
      const b = document.createElement('button');
      b.className = 'sym-btn';
      b.textContent = label;
      b.dataset.tip = latex;
      b.onclick = () => ins(latex);
      panel.appendChild(b);
    }
    panels.appendChild(panel);
    first = false;
  }
}

function activateSymTab(cat) {
  document.querySelectorAll('.sym-tab').forEach(t => t.classList.toggle('active', t.dataset.c===cat));
  document.querySelectorAll('.sym-panel').forEach(p => p.classList.toggle('active', p.dataset.c===cat));
  // Scroll active tab into view
  const bar = document.getElementById('sym-tabs');
  const active = bar.querySelector('.sym-tab.active');
  if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
}

function symScroll(dir) {
  const bar = document.getElementById('sym-tabs');

  const bar = document.getElementById('sym-tabs');
  const btnL = document.getElementById('sym-scroll-l');
  const btnR = document.getElementById('sym-scroll-r');
  const overflow = bar.scrollWidth > bar.clientWidth + 2;
  btnL.classList.toggle('visible', overflow);
  btnR.classList.toggle('visible', overflow);

  for (const ex of EXAMPLES) {

      const h = document.createElement('div');
      h.className = 'ex-cat';
      h.textContent = catMap[ex.c] || ex.c;
      menu.appendChild(h);
      lastCat = ex.c;

// ═══════════════════════════════════════════════════════════════
//  RENDER  — uses MathJax.typesetPromise on a hidden sink element
// ═══════════════════════════════════════════════════════════════

// 将 SVG width/height 属性（ex/em/px）转为像素，作为 getBoundingClientRect 的 fallback
function svgPxFromAttr(svgEl, attr, fontSize) {
  const raw = svgEl.getAttribute(attr) || '';
  const n   = parseFloat(raw);
  if (isNaN(n)) return 0;
  if (raw.endsWith('ex')) return n * fontSize * 0.43;
  if (raw.endsWith('em')) return n * fontSize;
  return n; // already px or unitless
}
function schedule() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(renderNow, 550);
}

async function renderNow() {
  if (!mjReady) { setStatus('busy', t('s_waiting')); return; }
  clearTimeout(debounceTimer);

  const latex = inp.value.trim();
  const box = document.getElementById('preview-box');

  if (!latex) {
    box.innerHTML = `<div class="preview-hint">${t('preview_hint')}</div>`;
    currentSVGEl = null;
    setStatus('ok', t('s_ready'));
    return;
  }

  setStatus('busy', t('s_rendering'));
  const t0 = performance.now();
  const fs = +document.getElementById('sl-fs').value;

  const sink = document.getElementById('mj-sink');
  sink.style.fontSize = fs + 'px';

  // Wrap formula for MathJax to parse
  const wrapped = renderMode === 'display'
    ? `\\[${latex}\\]`
    : `\\(${latex}\\)`;

  // Clear previous render and set new content
  try { if (MathJax.typesetClear) MathJax.typesetClear([sink]); } catch {}
  sink.innerHTML = '';
  // Use a text node so LaTeX special chars are not parsed as HTML
  sink.appendChild(document.createTextNode(wrapped));

  try {
    await MathJax.typesetPromise([sink]);

    const svgEl = sink.querySelector('svg');
    if (!svgEl) throw new Error('未找到 SVG 输出，请检查公式语法');

    // 用实际渲染像素尺寸（sink 是 visibility:hidden 仍参与布局，BoundingClientRect 可靠）
    const rect = svgEl.getBoundingClientRect();
    const pw = rect.width  > 1 ? rect.width  : svgPxFromAttr(svgEl, 'width',  fs);
    const ph = rect.height > 1 ? rect.height : svgPxFromAttr(svgEl, 'height', fs);

    const clone = svgEl.cloneNode(true);
    clone.setAttribute('width',  pw);
    clone.setAttribute('height', ph);
    clone.style.width  = pw + 'px';
    clone.style.height = ph + 'px';

    box.innerHTML = '';
    box.appendChild(clone);
    currentSVGEl = clone;
    applyPreview();

    const dt = (performance.now()-t0).toFixed(0);
    setStatus('ok', t('s_render_ok'));
    document.getElementById('status-time').textContent = dt + ' ms';
  } catch(err) {
    const msg = String(err.message||err).replace(/\s+/g,' ').trim().slice(0,160);
    box.innerHTML = `<div class="error-card">⚠ ${esc(msg)}</div>`;
    currentSVGEl = null;
    setStatus('err', t('s_render_fail') + msg.slice(0,40));
  }
}

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function setStatus(state, text) {
  document.getElementById('status-dot').className  = 'status-dot ' + state;
  document.getElementById('status-text').textContent = text;
  if (state !== 'busy') document.getElementById('status-time').textContent = '';
}

// Build a fully self-contained SVG string for export
// - resolves currentColor → actual hex
// - ensures explicit px width/height
// - ensures xmlns declarations
function buildExportSVGString(svgEl, color) {
  const clone = svgEl.cloneNode(true);

  // Walk ALL elements (including inside <defs>) and replace currentColor
  clone.querySelectorAll('*').forEach(el => {
    // Attribute-based
    if (el.getAttribute('fill')   === 'currentColor') el.setAttribute('fill',   color);
    if (el.getAttribute('stroke') === 'currentColor') el.setAttribute('stroke', color);
    // Inline style-based
    if (el.style) {
      if (el.style.fill   === 'currentColor') el.style.fill   = color;
      if (el.style.stroke === 'currentColor') el.style.stroke = color;
      if (el.style.color  === 'currentColor') el.style.color  = color;
    }
  });
  // Also set the root SVG color
  clone.style.color = color;

  // Get rendered dimensions in px
  const rect = svgEl.getBoundingClientRect();
  const w = rect.width  > 0 ? rect.width  : (parseFloat(svgEl.getAttribute('width'))  || 300);
  const h = rect.height > 0 ? rect.height : (parseFloat(svgEl.getAttribute('height')) || 100);

  clone.setAttribute('width',  w);
  clone.setAttribute('height', h);
  clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  clone.setAttribute('xmlns:xlink', 'http://www.w3.org/1999/xlink');

  // XMLSerializer produces valid SVG with all namespaces
  const raw = new XMLSerializer().serializeToString(clone);
  return { svgStr: raw, w, h };
}

async function makePxSVGBlob(svgEl, color) {
  const { svgStr, w, h } = buildExportSVGString(svgEl, color);
  return { blob: new Blob([svgStr], {type:'image/svg+xml'}), w, h };
}

async function toCanvas() {
  if (!currentSVGEl) throw new Error('先渲染公式');
  const scale  = +document.getElementById('sl-sc').value;
  const fColor = document.getElementById('col-formula').value;
  const bColor = document.getElementById('col-bg').value;
  const alpha  = document.getElementById('sl-al').value / 100;
  const pad    = +document.getElementById('sl-pd').value;

  const { blob, w: svgW, h: svgH } = await makePxSVGBlob(currentSVGEl, fColor);
  const url = URL.createObjectURL(blob);

  let cW, cH;
  if (exportW > 0 && exportH > 0) { cW = exportW; cH = exportH; }
  else { cW = Math.round((svgW + pad*2)*scale); cH = Math.round((svgH + pad*2)*scale); }

  return new Promise((res,rej) => {
    const img = new Image();
    img.onload = () => {
      const cv = document.createElement('canvas');
      cv.width = cW; cv.height = cH;
      const ctx = cv.getContext('2d');

      const [r,g,b] = [1,3,5].map(i=>parseInt(bColor.slice(i,i+2),16));
      ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
      ctx.fillRect(0,0,cW,cH);

      if (exportW>0 && exportH>0) {
        const ratio = Math.min((cW-pad*2) / svgW, (cH-pad*2) / svgH);
        const dw = svgW*ratio, dh = svgH*ratio;
        ctx.drawImage(img, (cW-dw)/2, (cH-dh)/2, dw, dh);
      } else {
        ctx.drawImage(img, pad*scale, pad*scale, svgW*scale, svgH*scale);
      }
      URL.revokeObjectURL(url);
      res(cv);
    };
    img.onerror = () => { URL.revokeObjectURL(url); rej(new Error('图像加载失败')); };
    img.src = url;
  });
}

async function exportRaster(fmt) {
  if (!currentSVGEl) { alert(t('a_render_first')); return; }
  setStatus('busy', t('s_exporting'));
  try {
    const cv = await toCanvas();
    cv.toBlob(blob => { dl(blob,`formula.${fmt}`,`image/${fmt}`); setStatus('ok', t('s_export_ok')); },
              `image/${fmt}`, fmt==='jpeg'?0.95:undefined);
  } catch(e) { alert(t('a_export_fail')+e.message); setStatus('err', t('s_export_fail')); }
}

async function exportSVG() {
  if (!currentSVGEl) { alert(t('a_render_first')); return; }
  const fColor = document.getElementById('col-formula').value;
  const bColor = document.getElementById('col-bg').value;
  const alpha  = document.getElementById('sl-al').value / 100;
  const pad    = +document.getElementById('sl-pd').value;

  const { svgStr, w, h } = buildExportSVGString(currentSVGEl, fColor);

  // Parse the self-contained SVG and add background + padding
  const parser = new DOMParser();
  const doc  = parser.parseFromString(svgStr, 'image/svg+xml');
  const root = doc.documentElement;

  const totalW = w + pad*2, totalH = h + pad*2;
  root.setAttribute('width',  totalW);
  root.setAttribute('height', totalH);

  const [r,g,b] = [1,3,5].map(i=>parseInt(bColor.slice(i,i+2),16));
  const bgRect = doc.createElementNS('http://www.w3.org/2000/svg','rect');
  bgRect.setAttribute('x','0'); bgRect.setAttribute('y','0');
  bgRect.setAttribute('width', totalW); bgRect.setAttribute('height', totalH);
  bgRect.setAttribute('fill', `rgba(${r},${g},${b},${alpha})`);
  root.insertBefore(bgRect, root.firstChild);

  // Wrap content in a translate group for padding
  const grp = doc.createElementNS('http://www.w3.org/2000/svg','g');
  grp.setAttribute('transform', `translate(${pad},${pad})`);
  // Move all children (except bg rect we just inserted) into the group
  const toMove = [...root.children].filter(c => c !== bgRect);
  toMove.forEach(c => grp.appendChild(c));
  root.appendChild(grp);

  const finalStr = '<?xml version="1.0" encoding="UTF-8"?>\n'
                 + new XMLSerializer().serializeToString(root);
  dl(new Blob([finalStr], {type:'image/svg+xml'}), 'formula.svg');
  setStatus('ok', t('s_svg_ok'));
}

async function exportPDF() {
  if (!currentSVGEl) { alert(t('a_render_first')); return; }
  try {
    const cv = await toCanvas();
    const imgData = cv.toDataURL('image/png');
    const win = window.open('','_blank');
    win.document.write(`<!DOCTYPE html><html><head><style>
      @page{margin:0;size:${cv.width}px ${cv.height}px}
      body{margin:0;display:flex;align-items:center;justify-content:center;height:100vh}
      img{max-width:100%}
    </style></head><body onload="window.print();window.close()">
    <img src="${imgData}"></body></html>`);
    win.document.close();
    setStatus('ok', t('s_pdf_ok'));
  } catch(e) { alert(t('a_pdf_fail')+e.message); setStatus('err', t('s_export_fail')); }
}

async function copySVGCode() {
  if (!currentSVGEl) { alert(t('a_render_first')); return; }
  const fColor = document.getElementById('col-formula').value;
  const { svgStr: str } = buildExportSVGString(currentSVGEl, fColor);
  try {
    await navigator.clipboard.writeText(str);
  } catch {
    const ta = Object.assign(document.createElement('textarea'),{value:str});
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
  }
  setStatus('ok', t('s_svg_copied'));
}

function copyLatex() {
  const tex = inp.value;
  if (!tex) { alert(t('a_empty')); return; }
  navigator.clipboard.writeText(tex).catch(() => {
    const ta = Object.assign(document.createElement('textarea'),{value:tex});
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
  });
  setStatus('ok', t('s_latex_copied'));
}

function dl(blob, name) {
  const a = Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:name});
  a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}

// Wait for MathJax to fully initialize
(async () => {
  try {
    setStatus('busy', t('s_waiting'));
    let tries = 0;
    while (typeof MathJax === 'undefined' || !MathJax.startup) {
      await new Promise(r => setTimeout(r,150));
      if (++tries > 80) throw new Error(t('a_timeout'));
    }
    await MathJax.startup.promise;
    mjReady = true;
    setStatus('ok', t('s_mj_ready'));

    // 稍等一帧让 MathJax typeset 引擎完全就绪，再渲染默认公式
    await new Promise(r => setTimeout(r, 80));
    clearTimeout(debounceTimer);  // 取消 onSetting() 触发的 550ms 防抖，避免覆盖首屏公式
    inp.value = '\\int_{-\\infty}^{\\infty} e^{-x^2}\\,dx = \\sqrt{\\pi}';
    updateCC();
    await renderNow();
  } catch(e) {
    setStatus('err', t('s_mj_fail') + e.message);
  }
})();
